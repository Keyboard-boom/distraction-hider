<!doctype html>
<html lang="zh-CN" data-i18n-lang>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="appName"></title>
    <link rel="stylesheet" href="popup.css">
  </head>
<body>
    <main class="shell">
      <header class="topbar">
        <div class="title-block">
          <h1 data-i18n="appName"></h1>
          <p id="siteLabel"></p>
        </div>
        <div class="topbar-actions">
          <button id="langToggle" type="button" class="lang-toggle" data-i18n="langLabel"></button>
        <button id="toggleSite" class="switch-button" type="button" role="switch" aria-checked="true" data-i18n-title="toggleTitle" data-i18n-aria-label="toggleTitle">
          <span class="switch-track" aria-hidden="true">
            <span id="toggleIcon" class="switch-thumb"></span>
          </span>
        </button>
        </div>
      </header>

      <section class="actions" data-i18n-aria-label="actionsLabel">
        <button id="pickExact" class="primary" type="button">
          <span aria-hidden="true">⌖</span>
          <strong data-i18n="pickExact"></strong>
        </button>
        <button id="pickSimilar" type="button">
          <span aria-hidden="true">≋</span>
          <strong data-i18n="pickSimilar"></strong>
        </button>
      </section>

      <section class="tools" data-i18n-aria-label="toolsLabel">
        <button id="undoLast" type="button" data-i18n-title="undoTitle" data-i18n-aria-label="undoTitle">↶</button>
        <button id="clearSite" type="button" data-i18n-title="clearTitle" data-i18n-aria-label="clearTitle">⟲</button>
      </section>

      <section class="rules" data-i18n-aria-label="rulesLabel">
        <div class="section-title">
          <span data-i18n="sectionTitle"></span>
          <b id="ruleCount">0</b>
        </div>
        <ol id="ruleList"></ol>
        <p id="emptyState"></p>
      </section>

      <p id="errorText" role="status"></p>
    </main>
    <script src="translations.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
